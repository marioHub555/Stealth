name: Build Stealth Remastered (.asi)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4  # تم التحديث لـ v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2 # تم التحديث لـ v2

    - name: Build Solution
      run: msbuild "Stealth Remastered.sln" /p:Configuration=Release /p:Platform=x86

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # هذا هو التغيير المهم (v4)
      with:
        name: Stealth-Remastered-ASI
        path: Release/*.asi
